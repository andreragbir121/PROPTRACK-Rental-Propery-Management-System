<div class="header-actions">
  <h2>Properties Registry</h2>
  <button routerLink="/properties/new" class="btn-add">Add New Property</button>
</div>

<div *ngIf="loading">Loading properties...</div>
<div *ngIf="error" class="error-msg">{{ error }}</div>

<div *ngIf="!loading && properties.length === 0">No properties found.</div>

<div class="property-list" *ngIf="!loading && properties.length > 0">
  <div *ngFor="let property of properties" class="property-card">
    <h3>{{ property.name }}</h3>
    <p><strong>Address:</strong> {{ property.address }}</p>
    <p><strong>Rent:</strong> {{ property.monthlyRent }} TTD / month</p>
    <span class="status-badge" [ngClass]="property.status.toLowerCase()">
      {{ property.status }}
    </span>

    <div class="card-actions">
      <button [routerLink]="['/properties', property.id]" class="btn-view">View Details</button>
      <button (click)="onDelete(property.id, property.name)" class="btn-delete">Delete</button>
    </div>
  </div>
</div>
